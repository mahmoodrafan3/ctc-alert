# ============================================================
# REPO HEARTBEAT — Prevents GitHub from disabling workflows
# ============================================================
#
# GitHub automatically DISABLES scheduled workflows in
# repositories that have had no push activity for 60 days.
# This workflow pushes a weekly empty commit to keep the
# repo "active" so your scheduled workflows keep running.
#
# Without this, your "Wake Render Before Sessions" workflow
# would silently stop working after ~60 days of no pushes.
#
# ============================================================
# THE PROBLEM (why your Action stopped working):
# ------------------------------------------------
# GitHub disables scheduled (cron) workflows if the repo has
# no commits for 60 days. Manual triggers (workflow_dispatch)
# still work, but the schedule stops firing.
#
# This workflow fixes that by making a weekly commit, which
# resets the 60-day inactivity counter.
# ============================================================

name: Repo Heartbeat Keepalive

on:
  schedule:
    # Every Saturday at 12:00 UTC — once a week is enough
    - cron: '0 12 * * 6'
  workflow_dispatch: # Manual run if needed

jobs:
  heartbeat:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    permissions:
      contents: write  # Required to push commits

    steps:
      - uses: actions/checkout@v4
        with:
          # GITHUB_TOKEN has write access by default
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 💓 Push heartbeat commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git commit --allow-empty -m "chore: weekly heartbeat keepalive [skip ci]"

          BRANCH=$(git rev-parse --abbrev-ref HEAD)
          git push origin HEAD:$BRANCH

          echo "✅ Heartbeat commit pushed to $BRANCH"
          echo "   Repo stays active — workflows won't be disabled for another 60 days"
