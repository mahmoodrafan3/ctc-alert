# ============================================================
# WAKE RENDER BEFORE SESSIONS
# ============================================================
# Pings your Render service to wake it up before trading
# sessions. Runs every 30 min during active hours to also
# keep GitHub from disabling the scheduled workflow.
#
# ⚙️ SETUP:
# 1. Add your Render URL as a GitHub secret:
#    Settings → Secrets and variables → Actions → New secret
#    Name: RENDER_URL
#    Value: https://your-app.onrender.com/health
#
# 2. To test: go to Actions tab → "Wake Render Before Sessions"
#    → "Run workflow" → "Run workflow"
# ============================================================

name: Wake Render Before Sessions

on:
  schedule:
    # ── Frequent pings during active hours (Mon-Fri 6:00-15:00 UTC) ──
    # Runs every 30 min so GitHub doesn't disable the workflow for inactivity
    - cron: '*/30 6-14 * * 1-5'

    # ── Pre-session wake-up pings (extra safety) ──
    - cron: '55 6 * * 1-5'   # London pre-wake at 6:55 UTC
    - cron: '55 11 * * 1-5'  # New York pre-wake at 11:55 UTC

  workflow_dispatch: # Manual trigger for testing

jobs:
  ping-render:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: ⏰ Ping Render with retry logic
        env:
          RENDER_URL: ${{ secrets.RENDER_URL }}
        run: |
          if [ -z "$RENDER_URL" ]; then
            echo "::error::RENDER_URL secret not set!"
            echo "Go to Settings → Secrets → Actions and add RENDER_URL"
            exit 1
          fi

          echo "⏰ $(date -u '+%H:%M:%S UTC') — Pinging Render..."
          echo "   URL: $RENDER_URL"

          # Retry up to 3 times with exponential backoff
          HTTP_CODE=""
          for i in 1 2 3; do
            echo "   ── Attempt $i of 3 ──"

            HTTP_CODE=$(curl --silent --show-error --max-time 60 \
              --write-out "%{http_code}" \
              --output /dev/null \
              "$RENDER_URL" 2>&1)

            CURL_EXIT=$?

            if [ $CURL_EXIT -eq 0 ] && [ -n "$HTTP_CODE" ] && [ "${HTTP_CODE:0:1}" = "2" ]; then
              echo "   ✅ Attempt $i succeeded — HTTP $HTTP_CODE"
              break
            fi

            if [ $CURL_EXIT -ne 0 ]; then
              echo "   ⚠️ curl failed (exit code $CURL_EXIT)"
            elif [ -z "$HTTP_CODE" ]; then
              echo "   ⚠️ No HTTP response received"
            else
              echo "   ⚠️ Bad HTTP status: $HTTP_CODE"
            fi

            if [ $i -lt 3 ]; then
              SLEEP=$((i * 15))
              echo "   🔄 Retrying in ${SLEEP}s..."
              sleep $SLEEP
            fi
          done

          # Final validation — exit with error if all retries failed
          if [ -z "$HTTP_CODE" ] || [ "${HTTP_CODE:0:1}" != "2" ]; then
            echo "::error::Render ping failed after 3 attempts (last HTTP: $HTTP_CODE)"
            exit 1
          fi

          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  ✅ Render is awake — HTTP $HTTP_CODE"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
